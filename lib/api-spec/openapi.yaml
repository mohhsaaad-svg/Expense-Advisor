openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Daily Expense Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: expenses
    description: Expense operations
  - name: budget
    description: Budget configuration
  - name: insights
    description: Spending insights and tips
  - name: recurring
    description: Recurring expense rules (auto-logged)
  - name: preferences
    description: Display and alert preferences
  - name: anthropic
    description: Ember AI advisor chat (Anthropic-backed)
  - name: goals
    description: Savings goals
  - name: challenges
    description: No-spend challenges
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: notes
    description: Alcove private notes
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
            default: /
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL with a post-logout redirect back to the validated `returnTo` path.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      description: Returns a list of expenses, optionally filtered by date range
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD)
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD)
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses/{id}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get expense by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateExpense
      tags: [expenses]
      summary: Update expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdate"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses/summary/daily:
    get:
      operationId: getDailySummary
      tags: [insights]
      summary: Today's spending summary
      description: Returns today's total spending, budget remaining, and breakdown by category
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD), defaults to today
      responses:
        "200":
          description: Daily summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySummary"

  /expenses/summary/weekly:
    get:
      operationId: getWeeklySummary
      tags: [insights]
      summary: This week's spending summary
      description: Returns spending totals grouped by day for the week containing the given date
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD); anchors the week, defaults to today
      responses:
        "200":
          description: Weekly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklySummary"

  /insights/stats:
    get:
      operationId: getSpendingStats
      tags: [insights]
      summary: Spending statistics and counters
      description: Month-to-date totals, projection, streaks and automated counters
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD), defaults to today
      responses:
        "200":
          description: Spending statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingStats"

  /recurring:
    get:
      operationId: listRecurringExpenses
      tags: [recurring]
      summary: List recurring expense rules
      responses:
        "200":
          description: List of recurring expense rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecurringExpense"
    post:
      operationId: createRecurringExpense
      tags: [recurring]
      summary: Create recurring expense rule
      description: Creates the rule and immediately auto-logs any occurrences due since its start date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringExpenseInput"
      responses:
        "201":
          description: Created recurring expense rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringExpense"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recurring/{id}:
    patch:
      operationId: updateRecurringExpense
      tags: [recurring]
      summary: Update recurring expense rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringExpenseUpdate"
      responses:
        "200":
          description: Updated recurring expense rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringExpense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRecurringExpense
      tags: [recurring]
      summary: Delete recurring expense rule
      description: Already-logged expenses are kept (their recurring link is cleared)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /preferences:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get preferences
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"
    put:
      operationId: updatePreferences
      tags: [preferences]
      summary: Update preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencesInput"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /insights/safe-to-spend:
    get:
      operationId: getSafeToSpend
      tags: [insights]
      summary: Safe-to-spend before payday
      description: Deterministic server-computed "safe to spend until next salary" figure with a full traceable breakdown (salary − spent this cycle − upcoming commitments − goal buffers)
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD) treated as "today", defaults to server date
      responses:
        "200":
          description: Safe-to-spend breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeToSpend"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /insights/tips:
    get:
      operationId: getSpendingTips
      tags: [insights]
      summary: Get personalized spending tips
      description: Returns tips and alerts based on spending patterns
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: ISO date string (YYYY-MM-DD) treated as "today", defaults to server date
      responses:
        "200":
          description: Spending tips and alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingInsights"

  /budget:
    get:
      operationId: getBudget
      tags: [budget]
      summary: Get budget settings
      responses:
        "200":
          description: Budget settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
    put:
      operationId: updateBudget
      tags: [budget]
      summary: Update budget settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetInput"
      responses:
        "200":
          description: Updated budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all advisor conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get a conversation with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive the assistant reply as an SSE stream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List savings goals
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a savings goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Created goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /goals/{id}:
    patch:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalUpdate"
      responses:
        "200":
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /goals/{id}/contribute:
    post:
      operationId: contributeToGoal
      tags: [goals]
      summary: Add to (or withdraw from) a goal's saved amount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalContribution"
      responses:
        "200":
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /challenges:
    get:
      operationId: listChallenges
      tags: [challenges]
      summary: List no-spend challenges with computed progress
      parameters:
        - name: today
          in: query
          required: false
          description: Client-local date (YYYY-MM-DD) used to compute progress; defaults to the server date
          schema:
            type: string
      responses:
        "200":
          description: List of challenges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Challenge"
    post:
      operationId: createChallenge
      tags: [challenges]
      summary: Start a no-spend challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengeInput"
      responses:
        "201":
          description: Created challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /challenges/{id}:
    delete:
      operationId: deleteChallenge
      tags: [challenges]
      summary: Delete a challenge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List the current user's notes
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{id}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get note by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteUpdate"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Note:
      type: object
      required: [id, title, body, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        createdAt:
          type: string
          description: ISO datetime string
        updatedAt:
          type: string
          description: ISO datetime string

    NoteInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string

    NoteUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string

    Expense:
      type: object
      required: [id, amount, category, description, date, recurringId, createdAt]
      properties:
        id:
          type: integer
        amount:
          type: number
          description: Amount in dollars
        category:
          type: string
          description: Expense category (e.g. Food, Transport, Shopping)
        description:
          type: string
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        recurringId:
          type: [integer, 'null']
          description: Set when this expense was auto-logged from a recurring rule
        createdAt:
          type: string
          description: ISO datetime string

    ExpenseInput:
      type: object
      required: [amount, category, description, date]
      properties:
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)

    ExpenseUpdate:
      type: object
      properties:
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        date:
          type: string

    Budget:
      type: object
      required: [id, dailyLimit, monthlyLimit, salaryAmount, salaryDay, updatedAt]
      properties:
        id:
          type: integer
        dailyLimit:
          type: number
          description: Daily spending limit in major currency units
        monthlyLimit:
          type: number
          description: Spending ceiling per salary cycle (or calendar month when no salary day is set)
        salaryAmount:
          type: [number, 'null']
          description: Net salary landing each payday; null when not set
        salaryDay:
          type: [integer, 'null']
          description: Day of month the salary lands (1-31, clamped into short months); null = calendar-month budgeting
        updatedAt:
          type: string
          description: ISO datetime string

    BudgetInput:
      type: object
      required: [dailyLimit, monthlyLimit]
      properties:
        dailyLimit:
          type: number
          minimum: 1
        monthlyLimit:
          type: number
          minimum: 1
        salaryAmount:
          type: [number, 'null']
          minimum: 0.001
          description: Net salary per payday; null clears it, omitted leaves it unchanged
        salaryDay:
          type: [integer, 'null']
          minimum: 1
          maximum: 31
          description: Day of month the salary lands; null switches back to calendar-month budgeting, omitted leaves it unchanged

    SafeToSpendCommitment:
      type: object
      required: [description, amount, dueDate]
      properties:
        description:
          type: string
        amount:
          type: number
          description: Committed amount due before payday
        dueDate:
          type: string
          description: ISO date string (YYYY-MM-DD)

    SafeToSpendGoalBuffer:
      type: object
      required: [name, amount, deadline]
      properties:
        name:
          type: string
        amount:
          type: number
          description: Amount reserved for this goal this pay cycle
        deadline:
          type: [string, 'null']
          description: Goal deadline (YYYY-MM-DD)

    SafeToSpend:
      type: object
      required:
        [date, configured, salaryDay, cycleStart, nextPayday, daysUntilPayday, salary,
         spentThisCycle, upcomingCommitments, upcomingCommitmentsTotal, goalBuffers,
         goalBuffersTotal, safeToSpend, safePerDay]
      properties:
        date:
          type: string
          description: The "today" the figure was computed for (YYYY-MM-DD)
        configured:
          type: boolean
          description: False until salaryAmount and salaryDay are set on the budget
        salaryDay:
          type: [integer, 'null']
        cycleStart:
          type: [string, 'null']
          description: Most recent salary date on or before `date`
        nextPayday:
          type: [string, 'null']
          description: Next salary date (exclusive end of the cycle)
        daysUntilPayday:
          type: [integer, 'null']
        salary:
          type: [number, 'null']
          description: Net salary received at cycle start
        spentThisCycle:
          type: number
          description: Everything logged from cycleStart through `date`
        upcomingCommitments:
          type: array
          description: Recurring charges still due strictly before nextPayday
          items:
            $ref: "#/components/schemas/SafeToSpendCommitment"
        upcomingCommitmentsTotal:
          type: number
        goalBuffers:
          type: array
          description: Per-goal reservations for deadline-driven savings goals
          items:
            $ref: "#/components/schemas/SafeToSpendGoalBuffer"
        goalBuffersTotal:
          type: number
        safeToSpend:
          type: [number, 'null']
          description: salary − spentThisCycle − upcomingCommitmentsTotal − goalBuffersTotal
        safePerDay:
          type: [number, 'null']
          description: max(0, safeToSpend) spread across daysUntilPayday

    CategoryBreakdown:
      type: object
      required: [category, total, count, percentage]
      properties:
        category:
          type: string
        total:
          type: number
        count:
          type: integer
        percentage:
          type: number

    DailySummary:
      type: object
      required: [date, totalSpent, dailyLimit, remaining, percentUsed, categories, expenseCount]
      properties:
        date:
          type: string
        totalSpent:
          type: number
        dailyLimit:
          type: number
        remaining:
          type: number
        percentUsed:
          type: number
        expenseCount:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBreakdown"

    DaySpending:
      type: object
      required: [date, total, count]
      properties:
        date:
          type: string
        total:
          type: number
        count:
          type: integer

    WeeklySummary:
      type: object
      required: [weekTotal, dailyAverage, days, topCategory]
      properties:
        weekTotal:
          type: number
        dailyAverage:
          type: number
        topCategory:
          type: ["string", "null"]
        days:
          type: array
          items:
            $ref: "#/components/schemas/DaySpending"

    SpendingTip:
      type: object
      required: [id, type, title, message]
      properties:
        id:
          type: string
        type:
          type: string
          description: "alert | tip | warning | positive"
        title:
          type: string
        message:
          type: string

    SpendingInsights:
      type: object
      required: [tips, alerts]
      properties:
        tips:
          type: array
          items:
            $ref: "#/components/schemas/SpendingTip"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/SpendingTip"

    RecurringExpense:
      type: object
      required: [id, description, amount, category, frequency, startDate, active, lastMaterializedDate, createdAt]
      properties:
        id:
          type: integer
        description:
          type: string
        amount:
          type: number
        category:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, yearly]
        startDate:
          type: string
          description: ISO date string (YYYY-MM-DD); anchors the repeat schedule
        active:
          type: boolean
        lastMaterializedDate:
          type: [string, 'null']
          description: Occurrences up to this date have been auto-logged
        createdAt:
          type: string
          description: ISO datetime string

    RecurringExpenseInput:
      type: object
      required: [description, amount, category, frequency, startDate]
      properties:
        description:
          type: string
          minLength: 1
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
          minLength: 1
        frequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, yearly]
        startDate:
          type: string
          description: ISO date string (YYYY-MM-DD)
        active:
          type: boolean

    RecurringExpenseUpdate:
      type: object
      properties:
        description:
          type: string
          minLength: 1
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
          minLength: 1
        frequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, yearly]
        startDate:
          type: string
        active:
          type: boolean

    Preferences:
      type: object
      required: [id, currency, language, alertThreshold, paydayPromptDismissed, updatedAt]
      properties:
        id:
          type: integer
        currency:
          type: string
          enum: [USD, EUR, GBP, JPY, INR, CAD, AUD, JOD, KWD, BHD]
        language:
          type: string
          enum: [en, ar]
          description: UI + AI coach language ("en" default, "ar" enables RTL Arabic)
        alertThreshold:
          type: integer
          description: Percent of daily limit at which warnings fire
        paydayPromptDismissed:
          type: boolean
          description: Whether the payday budgeting prompt has been dismissed for this account
        updatedAt:
          type: string
          description: ISO datetime string

    PreferencesInput:
      type: object
      required: [currency, alertThreshold]
      properties:
        currency:
          type: string
          enum: [USD, EUR, GBP, JPY, INR, CAD, AUD, JOD, KWD, BHD]
        language:
          type: string
          enum: [en, ar]
        alertThreshold:
          type: integer
          minimum: 50
          maximum: 100
        paydayPromptDismissed:
          type: boolean
          description: Omit to leave the current value unchanged

    Obligation:
      type: object
      required: [recurringId, description, category, amount, date, frequency]
      description: A committed recurring payment mapped into the current salary cycle
      properties:
        recurringId:
          type: integer
        description:
          type: string
        category:
          type: string
        amount:
          type: number
        date:
          type: string
          description: Occurrence date within the cycle (YYYY-MM-DD)
        frequency:
          type: string
          enum: [daily, weekly, monthly, quarterly, yearly]

    SpendingStats:
      type: object
      description: >
        Cycle-based counters. When a salary day is set the window runs
        payday -> day before next payday; otherwise it falls back to the
        calendar month. `monthToDate`/`projectedMonthEnd`/`daysInMonth` are
        computed over that window.
      required:
        [
          date,
          monthToDate,
          projectedMonthEnd,
          monthlyLimit,
          monthPercentUsed,
          avgPerDay,
          daysElapsed,
          daysInMonth,
          cycleStart,
          cycleEnd,
          cycleAnchored,
          nextPayday,
          daysUntilPayday,
          salaryAmount,
          committedTotal,
          committedRemaining,
          upcomingObligations,
          underBudgetStreak,
          totalExpenseCount,
          activeRecurringCount,
          recurringMonthlyTotal,
        ]
      properties:
        date:
          type: string
        monthToDate:
          type: number
          description: Spend from cycle start through `date`
        projectedMonthEnd:
          type: number
          description: Straight-line projection of this cycle's spend
        monthlyLimit:
          type: number
          description: Spending ceiling for the cycle
        monthPercentUsed:
          type: number
        avgPerDay:
          type: number
        daysElapsed:
          type: integer
          description: Days elapsed in the cycle including `date`
        daysInMonth:
          type: integer
          description: Total days in the cycle
        cycleStart:
          type: string
          description: First day of the current cycle (YYYY-MM-DD)
        cycleEnd:
          type: string
          description: Last day of the current cycle (YYYY-MM-DD)
        cycleAnchored:
          type: boolean
          description: True when anchored to a salary day, false for calendar-month fallback
        nextPayday:
          type: [string, 'null']
          description: Next payday (YYYY-MM-DD) when anchored, null otherwise
        daysUntilPayday:
          type: [integer, 'null']
          description: Days from `date` until the next payday when anchored, null otherwise
        salaryAmount:
          type: [number, 'null']
          description: Net salary per payday when set, null otherwise
        committedTotal:
          type: number
          description: Total committed obligations (recurring rules) falling inside this cycle
        committedRemaining:
          type: number
          description: Committed obligations still due after `date` in this cycle
        upcomingObligations:
          type: array
          description: Obligations due after `date` and before the cycle ends, soonest first
          items:
            $ref: "#/components/schemas/Obligation"
        underBudgetStreak:
          type: integer
          description: Consecutive days (ending today) at or under the daily limit
        totalExpenseCount:
          type: integer
        activeRecurringCount:
          type: integer
        recurringMonthlyTotal:
          type: number
          description: Approximate monthly cost of all active recurring rules

    AnthropicConversation:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          description: ISO datetime string

    AnthropicMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          description: user or assistant
        content:
          type: string
        createdAt:
          type: string
          description: ISO datetime string

    AnthropicConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1

    AnthropicMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    AnthropicConversationWithMessages:
      type: object
      required: [id, title, createdAt, messages]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          description: ISO datetime string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"

    Goal:
      type: object
      required: [id, name, targetAmount, savedAmount, deadline, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        targetAmount:
          type: number
          description: Target amount in dollars
        savedAmount:
          type: number
          description: Amount saved so far, in dollars
        deadline:
          type: [string, 'null']
          description: Optional target date (YYYY-MM-DD)
        createdAt:
          type: string
          description: ISO datetime string

    GoalInput:
      type: object
      required: [name, targetAmount]
      properties:
        name:
          type: string
          minLength: 1
        targetAmount:
          type: number
          minimum: 0.01
        deadline:
          type: [string, 'null']
          description: Optional target date (YYYY-MM-DD)

    GoalUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        targetAmount:
          type: number
          minimum: 0.01
        deadline:
          type: [string, 'null']
          description: Target date (YYYY-MM-DD) or null to clear

    GoalContribution:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          description: Positive to add, negative to withdraw; saved amount never drops below zero

    Challenge:
      type: object
      required: [id, name, category, startDate, durationDays, endDate, status, daysElapsed, violations, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: [string, 'null']
          description: Category the challenge blocks; null means all spending counts
        startDate:
          type: string
          description: ISO date string (YYYY-MM-DD)
        durationDays:
          type: integer
        endDate:
          type: string
          description: Last day of the challenge, inclusive (YYYY-MM-DD)
        status:
          type: string
          enum: [active, completed, failed]
        daysElapsed:
          type: integer
          description: Days into the challenge so far (0 before start, capped at durationDays)
        violations:
          type: integer
          description: Number of logged expenses that break the challenge
        createdAt:
          type: string
          description: ISO datetime string

    ChallengeInput:
      type: object
      required: [name, durationDays]
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: [string, 'null']
          description: Restrict to one category; omit or null to count all spending
        startDate:
          type: string
          description: Defaults to today (YYYY-MM-DD)
        durationDays:
          type: integer
          minimum: 1
          maximum: 365
