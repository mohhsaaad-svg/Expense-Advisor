kind = "web"
previewPath = "/alcove/"
title = "Alcove"
version = "1.0.0"
id = "artifacts/alcove"
router = "path"

[[services]]
name = "web"
paths = [ "/alcove/" ]
localPort = 21150

[services.development]
run = "pnpm --filter @workspace/alcove run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alcove", "run", "build" ]
serve = "static"
publicDir = "artifacts/alcove/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21150"
BASE_PATH = "/alcove/"
