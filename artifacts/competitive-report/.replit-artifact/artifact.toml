kind = "web"
previewPath = "/competitive-report/"
title = "Ember Competitive Analysis"
version = "1.0.0"
id = "artifacts/competitive-report"
router = "path"

[[services]]
name = "web"
paths = [ "/competitive-report/" ]
localPort = 19239

[services.development]
run = "pnpm --filter @workspace/competitive-report run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/competitive-report", "run", "build" ]
serve = "static"
publicDir = "artifacts/competitive-report/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19239"
BASE_PATH = "/competitive-report/"
